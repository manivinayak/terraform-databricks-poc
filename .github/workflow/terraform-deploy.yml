name: 'Kiewit Platform Deploy'

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write      # Crucial for OIDC
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true

    steps:
      - uses: actions/checkout@v4

      - name: 'Az CLI login'
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: 'Deploy Global'
        run: |
          cd terraform/global-init
          terraform init -backend-config="key=global.tfstate"
          terraform apply -auto-approve

      - name: 'Deploy Kiewit-1'
        run: |
          cd terraform/projects/kiewit-1
          terraform init -backend-config="key=kiewit1.tfstate"
          terraform apply -auto-approve
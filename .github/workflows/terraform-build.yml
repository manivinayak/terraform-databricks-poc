name: "Kiewit Platform Deploy"

on:
  push:
    branches: ["main"]

permissions:
  id-token: write # Required for Azure OIDC
  contents: read # Required to checkout the code

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest

    env:
      # OIDC Authentication Variables
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true

      # Backend configuration for remote state (set these in GitHub Secrets)
      TF_STATE_RG: ${{ secrets.TF_STATE_RG }}
      TF_STATE_STORAGE: ${{ secrets.TF_STATE_STORAGE }}
      TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: "Az CLI login"
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Terraform Backend
        run: |
          test -n "${{ env.TF_STATE_RG }}" || (echo "Missing secret: TF_STATE_RG" && exit 1)
          test -n "${{ env.TF_STATE_STORAGE }}" || (echo "Missing secret: TF_STATE_STORAGE" && exit 1)
          test -n "${{ env.TF_STATE_CONTAINER }}" || (echo "Missing secret: TF_STATE_CONTAINER" && exit 1)

          az group show --name "${{ env.TF_STATE_RG }}" --query name -o tsv
          az storage account show --name "${{ env.TF_STATE_STORAGE }}" --resource-group "${{ env.TF_STATE_RG }}" --query name -o tsv

      # --- STEP 1: Global Infrastructure (Folder: global-int) ---
      - name: "Terraform Init (Global)"
        working-directory: global-int
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=global.tfstate"

      - name: "Terraform Apply (Global)"
        working-directory: global-int
        run: terraform apply -auto-approve

